<div class="split-container">
  {{ $parts := split .Inner "|" }}
  <div class="split-column">
    {{ index $parts 0 | markdownify }}
  </div>
  <div class="split-column">
    {{ index $parts 1 | markdownify }}
  </div>
</div>

<style>
    .split-container {
        display: flex;
        {{/*  align-items: flex-start;  */}}
        gap: 20px;
        margin: 1rem 0;
    }
    .split-column {
        flex: 1;
    }
@media (max-width: 684px) {
    .split-container {
        flex-direction: column;
    }
}
</style>
